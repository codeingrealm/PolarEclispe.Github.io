<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Polar Eclipse</title>
  <style>
    body {
      background: #0b0f1a;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
    }

    .play-btn {
      background: #4aa3ff;
      border: none;
      padding: 15px 30px;
      font-size: 20px;
      border-radius: 10px;
      cursor: pointer;
      color: white;
      transition: 0.2s;
    }

    .play-btn:hover {
      background: #1f7fe0;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <h1>Polar Eclipse</h1>
  <p>Click play to join the game on Roblox</p>

  <button class="play-btn" onclick="playRoblox()">
    ▶ Play on Roblox
  </button>

  <script>
    function playRoblox() {
      // Opens Roblox game page
      window.location.href = "https://www.roblox.com/games/YOUR_GAME_ID";

      // Optional fallback (sometimes works better on PC)
      setTimeout(() => {
        window.location.href = "roblox://placeId=YOUR_GAME_ID";
      }, 1000);
    }
  </script>

</body>
</html>
